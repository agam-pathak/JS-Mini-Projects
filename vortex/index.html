<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex | The Chaos Spinner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="vortex-background"></div>
    <div class="game-container">
        <header>
            <h1 class="logo">VOR<span>TEX</span></h1>
            <p>QUANTUM SPIN GENERATOR</p>
        </header>

        <div class="vortex-arena">
            <div id="vortex-wheel" class="vortex-wheel">
                <canvas id="wheel-canvas" width="500" height="500"></canvas>
                <div class="center-glow"></div>
                <div class="pointer">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l-4 8h8l-4-8zm0 20l4-8h-8l4 8z"/></svg>
                </div>
            </div>
        </div>

        <section class="controls">
            <div class="prizes-list">
                <div class="prize-card active" id="last-win">READY TO SPIN</div>
            </div>
            <button id="spin-btn" class="main-btn">INITIATE VORTEX</button>
        </section>

        <footer>
            <span>SPIN STRENGTH: <strong id="spin-val">0</strong>%</span>
        </footer>
    </div>

    <!-- Sound Effects -->
    <audio id="sfx-spin" src="https://assets.mixkit.co/sfx/preview/mixkit-mechanical-timer-wind-up-1065.mp3"></audio>
    <audio id="sfx-win" src="https://assets.mixkit.co/sfx/preview/mixkit-bonus-earned-in-video-game-2058.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
