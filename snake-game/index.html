<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake - Enhanced Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="game-container">
        <header>
            <h1 class="glitch" data-text="NEON SNAKE">NEON SNAKE</h1>
            <div class="score-board">
                <div class="score-box">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-box">
                    <span class="label">HIGH SCORE</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </header>

        <!-- Big 800x600 Play Area -->
        <div class="canvas-wrapper" id="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            
            <div id="overlay" class="overlay">
                <div class="overlay-content">
                    <h2 id="overlay-title">READY?</h2>
                    <p id="overlay-desc">Press any arrow key to start</p>
                    <button id="action-btn" class="hidden">PLAY AGAIN</button>
                </div>
            </div>
        </div>

        <div class="controls-hint">
            <p>Use <span>W A S D</span> or <span>ARROW KEYS</span> to navigate. Now featuring Wrap-Around mapping!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
