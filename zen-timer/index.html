<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTimer | Deep Work & Focus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="work-mode">
    <div class="zen-container">
        <!-- Main Timer Display -->
        <main class="timer-card">
            <h1 id="mode-label">FOCUS</h1>
            <div class="timer-display">
                <span id="minutes">25</span>:<span id="seconds">00</span>
            </div>
            
            <div class="controls">
                <button id="start-btn" class="ctrl-btn main">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button id="pause-btn" class="ctrl-btn main hidden">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="reset-btn" class="ctrl-btn secondary">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
            </div>

            <!-- Mode Switcher -->
            <div class="mode-selectors">
                <button class="mode-btn active" data-mode="focus">WORK</button>
                <button class="mode-btn" data-mode="shortBreak">SHORT BREAK</button>
                <button class="mode-btn" data-mode="longBreak">LONG BREAK</button>
            </div>
        </main>

        <!-- Stats Bar -->
        <footer class="footer-stats">
            <div class="stat-item">
                <span class="label">SESSIONS</span>
                <span id="session-count">0</span>
            </div>
            <div class="stat-item">
                <span class="label">TOTAL TIME</span>
                <span id="total-focus-time">0</span> min
            </div>
        </footer>
    </div>

    <!-- Sound Assets -->
    <audio id="bell-sfx" src="https://assets.mixkit.co/sfx/preview/mixkit-hand-bell-ding-notification-2087.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
