<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Currency Converter</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://flagsapi.com/US/flat/64.png">
    <!-- CSS -->
    <link href="style.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h2>Smart Converter</h2>
        <form>
            <div class="amount">
                <p>Enter Amount</p>
                <input value="1" type="number" step="any" placeholder="0.00" />
            </div>
            
            <div class="dropdown">
                <div class="from">
                    <p>From</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/US/flat/64.png" alt="From Flag" />
                        <select name="from"></select>
                    </div>
                </div>
                
                <div class="swap-icon">
                    <i class="fa-solid fa-arrow-right-arrow-left"></i>
                </div>

                <div class="to">
                    <p>To</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/IN/flat/64.png" alt="To Flag" />
                        <select name="to"></select>
                    </div>
                </div>
            </div>

            <div class="msg">Initialising...</div>
            
            <button type="submit">Get Exchange Rate</button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="code.js"></script>
    <script src="script.js"></script>
</body>
</html>
